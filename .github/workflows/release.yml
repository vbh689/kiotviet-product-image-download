name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1
        required: true
        default: v0.1

permissions:
  contents: write

env:
  APP_NAME: kv-image-downloader

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      release_tag: ${{ steps.version.outputs.value }}
      release_name: ${{ env.APP_NAME }}-${{ steps.version.outputs.value }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      PYINSTALLER_CONFIG_DIR: ${{ matrix.platform == 'macos' && '/tmp/pyinstaller' || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller --noconfirm --clean --windowed --onedir --name "${APP_NAME}-${VERSION}" app.py

      - name: Package Windows release asset
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist\${env:APP_NAME}-${env:VERSION}" -DestinationPath "release\${env:APP_NAME}-${env:VERSION}-windows.zip"

      - name: Package Linux release asset
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p release
          zip -r "release/${APP_NAME}-${VERSION}-linux.zip" "dist/${APP_NAME}-${VERSION}"

      - name: Package macOS release asset
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p release
          zip -r "release/${APP_NAME}-${VERSION}-macos.zip" "dist/${APP_NAME}-${VERSION}" "dist/${APP_NAME}-${VERSION}.app"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/*.zip
          if-no-files-found: error

  publish-release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          files: release-assets/*.zip
          generate_release_notes: true
