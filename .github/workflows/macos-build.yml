name: Build macOS App

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: kv-image-downloader
  VERSION: v0.1

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      PYINSTALLER_CONFIG_DIR: /tmp/pyinstaller

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip openpyxl pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean --windowed --onedir --name "${APP_NAME}-${VERSION}" app.py

      - name: Package macOS release artifact
        run: |
          mkdir -p release
          zip -r "release/${APP_NAME}-${VERSION}-macos.zip" "dist/${APP_NAME}-${VERSION}" "dist/${APP_NAME}-${VERSION}.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-macos
          path: release/${{ env.APP_NAME }}-${{ env.VERSION }}-macos.zip
          if-no-files-found: error
