name: Build Linux App

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: kv-image-downloader
  VERSION: v0.1

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip openpyxl pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean --windowed --onedir --name "${APP_NAME}-${VERSION}" app.py

      - name: Package Linux release artifact
        run: |
          mkdir -p release
          zip -r "release/${APP_NAME}-${VERSION}-linux.zip" "dist/${APP_NAME}-${VERSION}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux
          path: release/${{ env.APP_NAME }}-${{ env.VERSION }}-linux.zip
          if-no-files-found: error
