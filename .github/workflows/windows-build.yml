name: Build Windows App

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: kv-image-downloader
  VERSION: v0.1

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip openpyxl pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean --windowed --onedir --name "${{ env.APP_NAME }}-${{ env.VERSION }}" app.py

      - name: Package Windows release artifact
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist\${{ env.APP_NAME }}-${{ env.VERSION }}" -DestinationPath "release\${{ env.APP_NAME }}-${{ env.VERSION }}-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-windows
          path: release/${{ env.APP_NAME }}-${{ env.VERSION }}-windows.zip
          if-no-files-found: error
